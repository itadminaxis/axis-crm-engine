<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacion de Mando Axis</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --ink: #0A0A0A;
            --cream: #FFF8F0;
            --rosa: #FF2D7B;
            --naranja: #FF6B2B;
            --char: #111;
            --glass: rgba(255, 255, 255, 0.03);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--ink);
            color: var(--cream);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* AUTH OVERLAY */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ink);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .auth-card {
            background: var(--char);
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            border: 1px solid var(--glass);
        }
        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            margin: 20px 0;
            border-radius: 4px;
        }

        /* MAIN LAYOUT */
        header {
            padding: 15px 30px;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--glass);
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            background: linear-gradient(135deg, var(--rosa), var(--naranja));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 60px);
        }

        /* CANVAS AREA */
        #canvas-container {
            flex: 2;
            position: relative;
            border-right: 1px solid var(--glass);
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        #flow-canvas { width: 100%; height: 100%; }

        /* DASHBOARD AREA */
        #sidebar {
            flex: 1;
            background: #0d0d0d;
            overflow-y: auto;
            padding: 20px;
        }
        h2 { font-family: 'Syne', sans-serif; font-size: 16px; margin-bottom: 15px; color: #888; }

        .lead-card {
            background: var(--char);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 3px solid var(--rosa);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .lead-phone { font-weight: 600; color: var(--rosa); font-size: 14px; }
        .lead-meta { font-size: 11px; color: #555; margin-top: 5px; }
        .badge {
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            text-transform: uppercase;
        }

        /* TIMELINE PANEL */
        #timeline-panel {
            position: fixed; top: 0; right: 0; width: 400px; height: 100vh;
            background: #0a0a0a; border-left: 1px solid #222;
            z-index: 900; padding: 20px; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.3s ease;
        }
        #timeline-panel.open { transform: translateX(0); }
        .timeline-event {
            border-left: 2px solid var(--rosa);
            padding: 10px 15px; margin-bottom: 12px; margin-left: 10px;
            position: relative;
        }
        .timeline-event::before {
            content: ''; position: absolute; left: -6px; top: 14px;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--rosa);
        }
        .timeline-event .ev-type { font-size: 12px; font-weight: 600; color: var(--naranja); }
        .timeline-event .ev-source { font-size: 10px; color: #555; }
        .timeline-event .ev-time { font-size: 10px; color: #444; margin-top: 4px; }
        .timeline-event .ev-payload { font-size: 10px; color: #333; margin-top: 4px; font-family: monospace; }
        .lead-card { cursor: pointer; }
        .lead-card:hover { border-left-color: var(--naranja); }

        .hidden { display: none; }
        .btn {
            background: var(--rosa);
            color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h1>Estacion de Mando</h1>
            <p style="color:#888; margin-top:10px;">Ingresa tu API Key Maestra.</p>
            <input type="password" id="api-key" placeholder="93f9a45054b07241...">
            <button class="btn" style="width:100%;" onclick="initStation()">Entrar</button>
        </div>
    </div>

    <header id="main-header" class="hidden">
        <h1>Axis Command Station</h1>
        <div style="display:flex; gap:20px; align-items:center;">
            <div id="connection-status" style="color:#0f0; font-size:12px; font-weight:600;">ONLINE</div>
        </div>
    </header>

    <main id="main-content" class="hidden">
        <div id="canvas-container">
            <div id="flow-canvas"></div>
            <div style="position:absolute; bottom:20px; left:20px; color:#555; font-size:10px;">
                MODULAR ECOSYSTEM DAG V2.0
            </div>
        </div>

        <div id="sidebar">
            <div id="metrics-panel" style="margin-bottom:30px; background: rgba(255,255,255,0.02); padding:15px; border-radius:8px; border: 1px solid var(--glass);">
                <h2 style="margin-bottom:10px;">METRICAS ISO 25020</h2>
                <div id="metrics-content" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                </div>
            </div>
            <h2>ULTIMA ACTIVIDAD</h2>
            <div id="leads-list">
                <p style="color:#444; text-align:center; margin-top:40px;">Esperando leads...</p>
            </div>
        </div>
    </main>

    <!-- TIMELINE PANEL -->
    <div id="timeline-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; color:var(--naranja);">TIMELINE</h2>
            <button onclick="closeTimeline()" style="background:none; border:none; color:#555; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div id="timeline-phone" style="font-size:14px; color:var(--rosa); font-weight:600; margin-bottom:15px;"></div>
        <div id="timeline-events"></div>
    </div>

    <script>
        let network;
        let apiKey;

        async function initStation() {
            apiKey = document.getElementById('api-key').value;
            if (!apiKey) return alert('Ingresa tu API Key');

            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');

            await loadFlow();
            await loadLeads();
            await loadMetrics();
            connectSSE();

            setInterval(() => {
                loadMetrics();
            }, 30000);
        }

        let eventSource;
        function connectSSE() {
            eventSource = new EventSource(`/stream/live?x-api-key=${encodeURIComponent(apiKey)}`);

            // Fallback: SSE requiere auth por header, pero EventSource no lo soporta.
            // Usamos polling + SSE híbrido: SSE para notificación, fetch para datos.
            const sseEvents = ['lead.created', 'lead.updated', 'lead.processed',
                               'milestone.added', 'ai.prescription', 'response.sent',
                               'project.created', 'project.updated', 'callback.fired'];

            sseEvents.forEach(evType => {
                eventSource.addEventListener(evType, (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        showLiveToast(data);
                        loadLeads(); // Refrescar lista
                    } catch {}
                });
            });

            eventSource.onerror = () => {
                // Reconectar via polling fallback
                document.getElementById('connection-status').textContent = 'POLLING';
                document.getElementById('connection-status').style.color = '#F1C40F';
                eventSource.close();
                // Fallback a polling cada 10s
                setInterval(loadLeads, 10000);
            };

            eventSource.onopen = () => {
                document.getElementById('connection-status').textContent = 'LIVE';
                document.getElementById('connection-status').style.color = '#0f0';
            };
        }

        function showLiveToast(data) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed; top:70px; right:20px; background:#111; border:1px solid var(--rosa);
                border-radius:8px; padding:12px 16px; z-index:800; animation:slideIn 0.3s ease-out;
                max-width:300px;
            `;
            toast.innerHTML = `
                <div style="font-size:11px; color:var(--naranja); font-weight:600;">${data.event_type}</div>
                <div style="font-size:10px; color:#555; margin-top:4px;">${data.source || 'sistema'} - ${new Date(data.created_at).toLocaleTimeString()}</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function loadMetrics() {
            try {
                const response = await fetch('/metrics', { headers: { 'x-api-key': apiKey } });
                const data = await response.json();

                const container = document.getElementById('metrics-content');
                container.innerHTML = '';

                data.metrics.forEach(m => {
                    const div = document.createElement('div');
                    div.style.padding = "10px";
                    div.style.background = "#000";
                    div.style.borderRadius = "4px";
                    div.style.border = "1px solid #222";

                    div.innerHTML = `
                        <div style="font-size:9px; color:#555;">${m.id}</div>
                        <div style="font-size:11px; font-weight:600; margin:4px 0;">${m.name}</div>
                        <div style="font-size:18px; color:gold; font-family:'Syne';">${m.value}${m.unit || ''}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {}
        }

        async function loadFlow() {
            const response = await fetch('/flow', { headers: { 'x-api-key': apiKey } });
            const data = await response.json();

            const nodes = new vis.DataSet(data.nodes.map(n => ({
                ...n,
                font: { color: '#FFF8F0', size: 12, face: 'Outfit' },
                shape: 'dot', size: 15,
                color: getGroupColor(n.group)
            })));

            const edges = new vis.DataSet(data.edges.map(e => ({
                ...e, color: { color: '#333' }, width: 1, arrows: 'to'
            })));

            network = new vis.Network(document.getElementById('flow-canvas'), { nodes, edges }, {
                layout: { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 200 } },
                physics: { enabled: false }
            });
        }

        async function loadLeads() {
            try {
                const response = await fetch('/leads', { headers: { 'x-api-key': apiKey } });
                const leads = await response.json();

                const list = document.getElementById('leads-list');
                list.innerHTML = '';

                leads.forEach(lead => {
                    const card = document.createElement('div');
                    card.className = 'lead-card';
                    const name = lead.custom_data.nombre || 'Desconocido';
                    const source = lead.custom_data.source || 'X-Wing';

                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <span class="lead-phone">${lead.phone}</span>
                            <span class="badge">${source}</span>
                        </div>
                        <div style="margin-top:5px; font-size:13px;">${name}</div>
                        <div class="lead-meta">${new Date(lead.created_at).toLocaleTimeString()}</div>
                    `;
                    card.onclick = () => openTimeline(lead.id, lead.phone);
                    list.appendChild(card);
                });
            } catch (e) {}
        }

        async function openTimeline(leadId, phone) {
            const panel = document.getElementById('timeline-panel');
            const eventsDiv = document.getElementById('timeline-events');
            const phoneDiv = document.getElementById('timeline-phone');

            phoneDiv.textContent = phone;
            eventsDiv.innerHTML = '<p style="color:#444; text-align:center;">Cargando timeline...</p>';
            panel.classList.add('open');

            try {
                const response = await fetch(`/events/timeline/${leadId}`, { headers: { 'x-api-key': apiKey } });
                const events = await response.json();

                if (events.length === 0) {
                    eventsDiv.innerHTML = '<p style="color:#333; text-align:center; font-size:12px;">Sin eventos registrados.</p>';
                    return;
                }

                eventsDiv.innerHTML = events.map(ev => `
                    <div class="timeline-event">
                        <div class="ev-type">${ev.event_type}</div>
                        <div class="ev-source">${ev.source || 'sistema'}</div>
                        <div class="ev-time">${new Date(ev.created_at).toLocaleString()}</div>
                        ${ev.payload && Object.keys(ev.payload).length > 0 ? `<div class="ev-payload">${JSON.stringify(ev.payload).slice(0, 120)}</div>` : ''}
                    </div>
                `).join('');
            } catch (e) {
                eventsDiv.innerHTML = '<p style="color:#f55;">Error cargando timeline.</p>';
            }
        }

        function closeTimeline() {
            document.getElementById('timeline-panel').classList.remove('open');
        }

        function getGroupColor(group) {
            const colors = { wing: '#FF6B2B', sensor: '#FF2D7B', core: '#00D1FF', storage: '#8E44AD', ai: '#F1C40F', worker: '#2ECC71', effector: '#E67E22', vision: '#FFF' };
            return colors[group] || '#555';
        }
    </script>
</body>
</html>
